<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="390" viewBox="0 0 1180 390" role="img" aria-labelledby="title desc">
  <title id="title">액션 연출 동기화 책임 영역</title>
  <desc id="desc">요청 생성, 판정 및 동기화, 로컬 연출 세 책임 영역이 공유 액션 상태를 중심으로 이어지는 구조</desc>
  <defs>
    <style>
      .bg { fill: #f6f8fb; }
      .title { fill: #132238; font: 800 30px "Segoe UI", "Malgun Gothic", sans-serif; letter-spacing: 0; }
      .label { fill: #607086; font: 800 12px "Segoe UI", "Malgun Gothic", sans-serif; letter-spacing: 0; }
      .box-title { fill: #172033; font: 800 22px "Segoe UI", "Malgun Gothic", sans-serif; letter-spacing: 0; }
      .box-text { fill: #3e4b5e; font: 500 15px "Segoe UI", "Malgun Gothic", sans-serif; letter-spacing: 0; }
      .note { fill: #3e4b5e; font: 700 15px "Segoe UI", "Malgun Gothic", sans-serif; letter-spacing: 0; }
      .muted { fill: #6c7888; font: 500 14px "Segoe UI", "Malgun Gothic", sans-serif; letter-spacing: 0; }
      .card { fill: #ffffff; stroke-width: 2; }
      .request { stroke: #b9c4d2; }
      .decision { fill: #fff4e7; stroke: #e6a247; }
      .presentation { fill: #ecf8f0; stroke: #4fab6d; }
      .state { fill: #eaf4ff; stroke: #5798d9; }
      .local { fill: #fffaf0; stroke: #d4a22c; }
      .line { fill: none; stroke: #526173; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .soft-line { fill: none; stroke: #8290a2; stroke-width: 2; stroke-linecap: round; stroke-dasharray: 7 7; }
      .shadow { filter: drop-shadow(0 10px 18px rgba(28, 39, 55, .1)); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#526173"/>
    </marker>
  </defs>
  <rect class="bg" width="1180" height="390"/>
  <text x="54" y="58" class="title">세 책임 영역으로 보는 공통 구조</text>
  <text x="56" y="87" class="muted">실행 위치가 아니라 역할 기준이다. 요청은 생기고, 판정 주체는 결과를 확정하며, 연출은 공유 상태를 로컬에서 재구성한다.</text>

  <g class="shadow">
    <rect x="55" y="130" width="280" height="150" rx="12" class="card request"/>
    <text x="84" y="168" class="label">REQUEST</text>
    <text x="84" y="201" class="box-title">요청 생성</text>
    <text x="84" y="234" class="box-text">클라이언트 입력 · 서버 스크립트</text>
    <text x="84" y="260" class="box-text">AI · 로컬 시스템</text>
  </g>

  <g class="shadow">
    <rect x="450" y="130" width="280" height="150" rx="12" class="card decision"/>
    <text x="479" y="168" class="label">DECISION / SYNC</text>
    <text x="479" y="201" class="box-title">판정/동기화</text>
    <text x="479" y="234" class="box-text">가능 여부 · 중단 · 대체 확정</text>
    <text x="479" y="260" class="box-text">공유 액션 상태 갱신</text>
  </g>

  <g class="shadow">
    <rect x="845" y="130" width="280" height="150" rx="12" class="card presentation"/>
    <text x="874" y="168" class="label">PRESENTATION</text>
    <text x="874" y="201" class="box-title">로컬 연출</text>
    <text x="874" y="234" class="box-text">상태 변경 감지</text>
    <text x="874" y="260" class="box-text">애니메이션 · 이펙트 · 사운드</text>
  </g>

  <path class="line" marker-end="url(#arrow)" d="M335 205 L450 205"/>
  <path class="line" marker-end="url(#arrow)" d="M730 205 L845 205"/>
  <text x="356" y="190" class="note">액션/상태 요청</text>
  <text x="748" y="190" class="note">판정 결과 동기화</text>

  <g class="shadow">
    <rect x="55" y="312" width="1070" height="48" rx="10" class="card state"/>
    <text x="84" y="342" class="note">공유되는 것: 요청, 판정 결과, 액션 상태 전환</text>
    <text x="610" y="342" class="muted">로컬 재구성: 중간 좌표, Animator 진행, 이펙트 재생률</text>
  </g>
  <path class="soft-line" d="M590 280 L590 312"/>
</svg>
